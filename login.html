<html lang="es">

        <meta charset="utf-8" />

        <title>Iniciar Sesion</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <link href="css/styles.css" rel="stylesheet" />
        <style>
            .login-wrapper {
                min-height: calc(100vh - 140px);
                display: flex;
                align-items: center;
                justify-content: center;
                background: #f8f9fa;
                padding: 2rem 1rem;
            }
            .login-card {
                width: 100%;
                max-width: 440px;
                background: #fff;
                border-radius: 1rem;
                box-shadow: 0 4px 24px rgba(0,0,0,0.10);
                padding: 2.5rem 2rem;
            }
            .tab-btn {
                border: none;
                background: none;
                padding: 0.5rem 1.5rem;
                font-weight: 600;
                color: #6c757d;
                border-bottom: 3px solid transparent;
                transition: all 0.2s;
                cursor: pointer;
            }
            .tab-btn.active {
                color: #212529;
                border-bottom-color: #212529;
            }
            .form-control:focus {
                border-color: #212529;
                box-shadow: 0 0 0 0.2rem rgba(33,37,41,0.15);
            }
            .alert { font-size: 0.9rem; }
        </style>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container px-4 px-lg-5">
                <a class="navbar-brand fw-bold" href="index.php">Mi Tienda</a>
                <div class="collapse navbar-collapse">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                        <li class="nav-item"><a class="nav-link" href="index.php">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">Nosotros</a></li>
                    </ul>
                    <div class="d-flex align-items-center gap-2">
                        <a href="carrito.php" class="btn btn-outline-dark">
                            Carrito
                            <span class="badge bg-dark text-white ms-1 rounded-pill" id="cart-count">0</span>
                        </a>
                        <a href="login.html" class="btn btn-dark active">Iniciar Sesion</a>
                    </div>
                </div>
            </div>
        </nav>

        <div class="login-wrapper">
            <div class="login-card">
                <div class="text-center mb-4">
                    <h3 class="fw-bolder">Mi Tienda</h3>
                </div>

                <div class="d-flex border-bottom mb-4">
                    <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Iniciar Sesion</button>
                    <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Registrarse</button>
                </div>

                <div id="alert-box" class="alert" role="alert" style="display:none"></div>

                <div id="form-login">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Usuario o Correo</label>
                        <input type="text" class="form-control" id="login-usuario" placeholder="tu_usuario" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Contrasena</label>
                        <div class="d-flex gap-2">
                            <input type="password" class="form-control" id="login-password" placeholder="........" />
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePass('login-password', this)">Ver</button>
                        </div>
                    </div>
                    <button class="btn btn-dark w-100 py-2 fw-semibold mt-1" onclick="doLogin()">
                        Iniciar Sesion
                    </button>
                    <p class="text-center mt-3 text-muted small">No tienes cuenta? <a href="#" onclick="switchTab('register')" class="text-dark fw-semibold">Registrate aqui</a></p>
                </div>

                <div id="form-register" style="display:none">
                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label fw-semibold">Nombre</label>
                            <input type="text" class="form-control" id="reg-nombre" placeholder="Juan" />
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold">Apellido</label>
                            <input type="text" class="form-control" id="reg-apellido" placeholder="Perez" />
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Usuario</label>
                        <input type="text" class="form-control" id="reg-usuario" placeholder="mi_usuario" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Correo electronico</label>
                        <input type="email" class="form-control" id="reg-correo" placeholder="correo@ejemplo.com" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Contrasena</label>
                        <div class="d-flex gap-2">
                            <input type="password" class="form-control" id="reg-password" placeholder="........" />
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePass('reg-password', this)">Ver</button>
                        </div>
                    </div>
                    <button class="btn btn-dark w-100 py-2 fw-semibold mt-1" onclick="doRegister()">
                        Crear Cuenta
                    </button>
                    <p class="text-center mt-3 text-muted small">Ya tienes cuenta? <a href="#" onclick="switchTab('login')" class="text-dark fw-semibold">Inicia sesion</a></p>
                </div>
            </div>
        </div>

        <footer class="py-4 bg-dark">
            <div class="container"><p class="m-0 text-center text-white">Copyright &copy; Mi Tienda 2024</p></div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            if (localStorage.getItem('currentUser')) { window.location.href = 'index.php'; }

            document.getElementById('cart-count').textContent = '0';

            function switchTab(tab) {
                document.getElementById('form-login').style.display    = tab === 'login'    ? '' : 'none';
                document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
                document.getElementById('tab-login').classList.toggle('active', tab === 'login');
                document.getElementById('tab-register').classList.toggle('active', tab === 'register');
                hideAlert();
            }

            function showAlert(msg, type) {
                const el = document.getElementById('alert-box');
                el.className = 'alert alert-' + type;
                el.textContent = msg;
                el.style.display = '';
            }
            function hideAlert() { document.getElementById('alert-box').style.display = 'none'; }

            function togglePass(id, btn) {
                const input = document.getElementById(id);
                if (input.type === 'password') { input.type = 'text'; btn.textContent = 'Ocultar'; }
                else { input.type = 'password'; btn.textContent = 'Ver'; }
            }

            async function doLogin() {
                const usuario  = document.getElementById('login-usuario').value.trim();
                const password = document.getElementById('login-password').value;
                if (!usuario || !password) { showAlert('Por favor completa todos los campos.', 'warning'); return; }
                try {
                    const res  = await fetch('auth_login.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ usuario, contrasena: password })
                    });
                    const data = await res.json();
                    if (!data.ok) { showAlert(data.msg, 'danger'); return; }
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    window.location.href = 'index.php';
                } catch (e) {
                    showAlert('No se pudo conectar al servidor.', 'danger');
                }
            }

            async function doRegister() {
                const nombre     = document.getElementById('reg-nombre').value.trim();
                const apellido   = document.getElementById('reg-apellido').value.trim();
                const usuario    = document.getElementById('reg-usuario').value.trim();
                const correo     = document.getElementById('reg-correo').value.trim();
                const contrasena = document.getElementById('reg-password').value;
                if (!nombre || !apellido || !usuario || !correo || !contrasena) {
                    showAlert('Por favor completa todos los campos.', 'warning'); return;
                }
                if (contrasena.length < 6) { showAlert('La contrasena debe tener al menos 6 caracteres.', 'warning'); return; }
                try {
                    const res  = await fetch('auth_register.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ nombre, apellido, usuario, correo, contrasena })
                    });
                    const data = await res.json();
                    if (!data.ok) { showAlert(data.msg, 'danger'); return; }
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    window.location.href = 'index.php';
                } catch (e) {
                    showAlert('No se pudo conectar al servidor.', 'danger');
                }
            }

            document.addEventListener('keydown', e => {
                if (e.key === 'Enter') {
                    if (document.getElementById('form-login').style.display !== 'none') doLogin();
                    else doRegister();
                }
            });
        </script>
    </body>
</html>
